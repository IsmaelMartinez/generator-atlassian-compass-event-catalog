# Make sure the EventCatalog SDK OK
name: Verify Build
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Verify Build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Installation
        run: pnpm install
      - name: Build
        run: pnpm run build
