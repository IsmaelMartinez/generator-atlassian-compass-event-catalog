name: Lint
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Installation
        run: pnpm install
      - name: ESLint
        run: pnpm run lint
      - name: Prettier Code
        run: pnpm run format:diff
